<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 48" role="img" aria-label="gwt">
  <title>gwt — git worktree toolkit</title>
  <g fill="none" stroke="#2ea043" stroke-width="1.5" stroke-linecap="round">
    <!-- trunk: circle 1 — circle 2 — junction, one solid line -->
    <path d="M11.5 24 H16.5"/>
    <path d="M23.5 24 H30"/>
    <!-- top branch: up, rounded corner, one gap before the leaf -->
    <path d="M30 24 L30 14 Q30 12 32 12 H37.5"/>
    <!-- bottom branch -->
    <path d="M30 24 L30 34 Q30 36 32 36 H37.5"/>
    <!-- middle branch: broken once right after the junction -->
    <path d="M33.5 24 H46.5"/>
  </g>
  <circle cx="8"  cy="24" r="3.5" fill="#2ea043"/>
  <circle cx="20" cy="24" r="3.5" fill="#2ea043"/>
  <circle cx="44" cy="12" r="3.5" fill="#40c463"/>
  <circle cx="50" cy="24" r="3.5" fill="#40c463"/>
  <circle cx="44" cy="36" r="3.5" fill="#40c463"/>
</svg>
