<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-label="gwt — git worktree toolkit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1a15"/>
      <stop offset="1" stop-color="#0a110d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.6">
      <stop offset="0" stop-color="#2ea043" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2ea043" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#glow)"/>

  <!-- the mark (git-graph), scaled up -->
  <g transform="translate(407 39) scale(4)">
    <g fill="none" stroke="#2ea043" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.2 19.8 L13.5 24 H16.5"/>
      <path d="M23.5 24 H30"/>
      <path d="M30 24 L30 14 Q30 12 32 12 H35"/>
      <path d="M30 24 L30 34 Q30 36 32 36 H35"/>
      <path d="M33.5 24 H41"/>
    </g>
    <circle cx="8"    cy="17" r="3.5" fill="#2ea043"/>
    <circle cx="20"   cy="24" r="3.5" fill="#2ea043"/>
    <circle cx="41.5" cy="12" r="3.5" fill="#40c463"/>
    <circle cx="44.5" cy="24" r="3.5" fill="#40c463"/>
    <circle cx="41.5" cy="36" r="3.5" fill="#40c463"/>
  </g>

  <!-- wordmark -->
  <text x="635" y="177" fill="#e9f1eb"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="120" font-weight="700" letter-spacing="2">gwt</text>

  <!-- tagline -->
  <text x="640" y="255" text-anchor="middle" fill="#8fa79a"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="36" font-weight="500">git worktree toolkit</text>

  <!-- install pill -->
  <rect x="452" y="295" width="376" height="56" rx="28" fill="#12211a" stroke="#294036" stroke-width="1.5"/>
  <text x="640" y="333" text-anchor="middle" fill="#7f9e8c"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="28" font-weight="500">npx @bojangles/gwt</text>
</svg>
